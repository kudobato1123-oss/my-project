<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập — Kế hoạch Sản xuất</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a237e 0%, #283593 50%, #1565c0 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .box {
    background: #fff; border-radius: 16px; padding: 40px 36px;
    width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,.3);
  }
  .logo { text-align: center; margin-bottom: 28px; }
  .logo .icon { font-size: 44px; }
  .logo h1 { font-size: 18px; font-weight: 700; color: #1a237e; margin-top: 8px; }
  .logo p { font-size: 12px; color: #888; margin-top: 4px; }
  .fg { margin-bottom: 16px; }
  .fg label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 6px; }
  .fg input {
    width: 100%; border: 1.5px solid #ddd; border-radius: 8px;
    padding: 11px 14px; font-size: 14px; outline: none; transition: border .2s;
  }
  .fg input:focus { border-color: #3949ab; }
  .btn {
    width: 100%; background: #1a237e; color: #fff; border: none;
    border-radius: 8px; padding: 13px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background .2s; margin-top: 4px;
  }
  .btn:hover { background: #3949ab; }
  .error {
    background: #ffebee; color: #c62828; border: 1px solid #ef9a9a;
    border-radius: 8px; padding: 10px 14px; font-size: 13px;
    margin-bottom: 16px; display: none;
  }
  .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #bbb; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="icon">🏭</div>
    <h1>KẾ HOẠCH SẢN XUẤT</h1>
    <p>Vui lòng đăng nhập để tiếp tục</p>
  </div>
  <div class="error" id="err">⚠️ Mật khẩu không đúng, vui lòng thử lại.</div>
  <div class="fg">
    <label>Mật khẩu</label>
    <input type="password" id="pwd" placeholder="Nhập mật khẩu..." onkeydown="if(event.key==='Enter')login()">
  </div>
  <button class="btn" onclick="login()">🔓 Đăng nhập</button>
  <div class="footer">Hệ thống quản lý nội bộ</div>
</div>
<script>
async function login() {
  const pwd = document.getElementById('pwd').value;
  if (!pwd) return;
  const r = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pwd })
  });
  const d = await r.json();
  if (d.success) {
    window.location.href = '/plan.html';
  } else {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}
</script>
</body>
</html>
